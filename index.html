<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fallout Survival Calculator</title>
  <style>
    body { 
      font-family: system-ui, sans-serif; 
    }
    #calculator-container { 
      max-width: 100%; 
      margin: 0; 
      box-shadow: 0 10px 20px rgba(0,0,0,0.5); 
      border-radius: 10px; 
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div id="calculator-container">
    <div data-wasteland-calculator></div>
  </div>

  <!-- ✅ Fixed script source (proper MIME type) -->
  <script src="https://cdn.jsdelivr.net/gh/Angelyze/Fallout-Survival-Calculator@main/wasteland-calculator.js"></script>

  <!-- Safety fallback (in case anything goes wrong) -->
  <script>
    window.addEventListener('load', () => {
      const container = document.querySelector('[data-wasteland-calculator]');
      if (container && !container.__wastelandCalculatorMounted) {
        console.warn("Auto-boot didn't trigger – forcing manual init");
        if (window.WastelandCalculator) {
          window.WastelandCalculator.init(container, {
            title: "Fallout Survival Calculator",
            accentColor: "#ff9000"
          });
        } else {
          container.innerHTML = `<p style="color:#ff9000;text-align:center;padding:10px;font-size:1.2rem;">
            ❌ Could not load calculator.<br>
            Please refresh the page.
          </p>`;
        }
      }
    });
  </script>
</body>
</html>
